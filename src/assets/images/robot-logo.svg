<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Glowing aura behind the robot -->
  <circle cx="200" cy="200" r="160" fill="url(#blue-aura)" opacity="0.2" />
  
  <g transform="translate(60, 50)">
    <!-- Shoulders/Body -->
    <path d="M70 260 C 70 200, 210 200, 210 260" fill="#E2E8F0" stroke="#0F172A" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Chest Plate / Badge -->
    <path d="M110 240 L170 240 L140 270 Z" fill="#3B82F6" stroke="#0F172A" stroke-width="10" stroke-linejoin="round"/>

    <!-- Neck joint -->
    <rect x="110" y="160" width="60" height="30" fill="#94A3B8" stroke="#0F172A" stroke-width="12"/>

    <!-- Main Helmet -->
    <rect x="30" y="20" width="220" height="180" rx="90" fill="#FFFFFF" stroke="#0F172A" stroke-width="14"/>
    
    <!-- Face Screen Plate (Navy) -->
    <rect x="60" y="60" width="160" height="100" rx="40" fill="#0F172A"/>
    
    <!-- Glowing Cyan Eyes -->
    <!-- Left Eye -->
    <path d="M85 110 Q 100 95 115 110 Q 100 120 85 110" fill="#22D3EE" filter="url(#glow)"/>
    <!-- Right Eye -->
    <path d="M165 110 Q 180 95 195 110 Q 180 120 165 110" fill="#22D3EE" filter="url(#glow)"/>

    <!-- Ear Pieces -->
    <rect x="10" y="90" width="20" height="40" rx="10" fill="#3B82F6" stroke="#0F172A" stroke-width="10"/>
    <rect x="250" y="90" width="20" height="40" rx="10" fill="#3B82F6" stroke="#0F172A" stroke-width="10"/>

    <!-- Top Antenna -->
    <line x1="140" y1="20" x2="140" y2="-10" stroke="#0F172A" stroke-width="12" stroke-linecap="round"/>
    <circle cx="140" cy="-10" r="12" fill="#3B82F6" stroke="#0F172A" stroke-width="8"/>
  </g>

  <defs>
    <radialGradient id="blue-aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
